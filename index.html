      name="description"
      content="Free, privacy-first PDF tools. Merge, split, rotate and reorder PDFs entirely in your browser — your files are never uploaded to a server."
    />
    <title>playPDF — Free, private in-browser PDF tools (merge, split, rotate, reorder)</title>
    <link rel="canonical" href="https://pdf.patroventure.com/" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#ea580c" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="playPDF" />
    <meta property="og:title" content="playPDF — Free, private in-browser PDF tools" />
    <meta
      property="og:description"
      content="Merge, split, rotate and reorder PDFs 100% in your browser. Files never leave your device."
    />
    <meta property="og:url" content="https://pdf.patroventure.com/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="playPDF — Free, private in-browser PDF tools" />
    <meta
      name="twitter:description"
      content="Merge, split, rotate and reorder PDFs 100% in your browser. Files never leave your device."
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "playPDF",
        "url": "https://pdf.patroventure.com/",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Any (web browser)",
        "description": "Privacy-first PDF tools: merge, split, rotate and reorder PDFs entirely in your browser. Files are never uploaded.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "publisher": { "@type": "Organization", "name": "PatroVenture", "url": "https://patroventure.com/" }
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Are my PDF files uploaded to a server?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Every operation runs entirely in your browser using JavaScript. Your files never leave your device and are never sent to us or anyone else."
            }
          },
          {
            "@type": "Question",
            "name": "Is playPDF free?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, completely free. There is no sign-up, no account, no watermark on output files, and no page or size limits beyond what your browser can handle."
            }
          },
          {
            "@type": "Question",
            "name": "Can I split or merge a PDF without uploading it?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes — that is the whole point of playPDF. Splitting, merging, rotating and reordering all happen locally in your browser, so it works even on confidential documents."
            }
          },
          {
            "@type": "Question",
            "name": "Does it work offline?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "After the page has loaded once, the processing itself does not need a network connection — it all happens on your device."
            }
          },
          {
            "@type": "Question",
            "name": "Is there a file size limit?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "There is no fixed limit. Because everything is processed in your browser, very large files are bounded only by your device's available memory."
            }
          },
          {
            "@type": "Question",
            "name": "What happens to my files after I close the tab?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Nothing is stored. Files are held in memory only while the tab is open and are gone the moment you close or refresh it."
            }
          }
        ]
      }
    </script>
  </head>

    <div id="root"></div>
